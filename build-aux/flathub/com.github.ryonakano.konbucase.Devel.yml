id: com.github.ryonakano.konbucase.Devel
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: com.github.ryonakano.konbucase.Devel
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/vala
modules:
  - name: chcase
    buildsystem: meson
    sources:
      - type: archive
        url: https://github.com/ryonakano/chcase/archive/3.0.0-alpha.2.tar.gz
        sha256: 4bdf9aaba3b087f924e17dd2c7bdb6b298f240b7cb661b4efb5681944ffc4449
        x-checker-data:
          type: json
          url: https://api.github.com/repos/ryonakano/chcase/releases/latest
          version-query: .tag_name
          url-query: '"https://github.com/ryonakano/chcase/archive/" + .tag_name + ".tar.gz"'
          timestamp-query: .published_at

  - name: konbucase
    buildsystem: meson
    config-opts:
      - -Duse_submodule=false
      - -Dgranite=disabled
      - -Ddevelopment=true
    sources:
      - type: dir
        path: ../../
