id: com.github.ryonakano.konbucase.Devel
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: com.github.ryonakano.konbucase.Devel
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/vala
modules:
  - name: chcase
    buildsystem: meson
    sources:
      - type: archive
        url: https://github.com/ryonakano/chcase/archive/3.0.0-alpha.4.tar.gz
        sha256: bac3d03e4a8ba607a97d087680c350076fd31e7e667db583322dcfc110590f47
        x-checker-data:
          type: json
          url: https://api.github.com/repos/ryonakano/chcase/releases/latest
          version-query: .tag_name
          url-query: '"https://github.com/ryonakano/chcase/archive/" + .tag_name + ".tar.gz"'
          timestamp-query: .published_at

  - name: konbucase
    buildsystem: meson
    config-opts:
      - -Duse_submodule=false
      - -Dgranite=disabled
      - -Ddevelopment=true
    sources:
      - type: dir
        path: ../../
