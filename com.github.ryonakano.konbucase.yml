id: com.github.ryonakano.konbucase
runtime: io.elementary.Platform
runtime-version: '8.1'
sdk: io.elementary.Sdk
command: com.github.ryonakano.konbucase
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --metadata=X-DConf=migrate-path=/com/github/ryonakano/konbucase/
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/vala
build-options:
  libdir: /app/lib
modules:
  - name: blueprint-compiler
    buildsystem: meson
    cleanup:
      - '*'
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/blueprint-compiler.git
        tag: v0.20.4
        commit: 31b62c24a72c1670d2d93dcdf2d130f1ae12778e
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$

  - name: chcase
    buildsystem: meson
    sources:
      - type: archive
        url: https://github.com/ryonakano/chcase/archive/3.0.0-alpha.4.tar.gz
        sha256: bac3d03e4a8ba607a97d087680c350076fd31e7e667db583322dcfc110590f47
        x-checker-data:
          type: json
          url: https://api.github.com/repos/ryonakano/chcase/releases/latest
          version-query: .tag_name
          url-query: '"https://github.com/ryonakano/chcase/archive/" + .tag_name + ".tar.gz"'
          timestamp-query: .published_at

  - name: konbucase
    buildsystem: meson
    config-opts:
      - -Duse_submodule=false
      - -Dgranite=enabled
    sources:
      - type: dir
        path: .
